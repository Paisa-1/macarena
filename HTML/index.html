<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanClub - Premium Experience</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="secret-trigger" onclick="abrirAdmin()"></div>

<div class="logo-container">
    <img src="Logo.png" alt="Logo" class="logo-image">
    <div class="logo">PLANCLUB</div>
</div>

<div class="view active">
    <button class="btn" onclick="showPanel('loginPanel')">INICIAR SESIÓN</button>
    <br>
    <button class="btn" onclick="showPanel('registerPanel')">REGISTRARSE</button>
</div>

<!-- LOGIN -->
<div class="panel" id="loginPanel">
    <h2>BIENVENIDO</h2>
    <div class="input-group">
        <input type="text" id="loginUser" placeholder="Usuario">
    </div>

    <div class="input-group">
        <div style="position: relative;">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <span onclick="togglePassword('loginPass', this)">🐵</span>
        </div>
    </div>

    <button class="btn" onclick="validarLogin()">ENTRAR</button>
    <p onclick="showPanel('recoverPanel')">¿Olvidaste tu contraseña?</p>
    <div id="loginMsg" class="msg"></div>
    <div class="close" onclick="hidePanels()">VOLVER</div>
</div>

<!-- REGISTRO -->
<div class="panel" id="registerPanel">
    <h2>NUEVA CUENTA</h2>

    <div class="input-group">
        <input type="text" id="regUser" placeholder="Crea un Usuario">
    </div>

    <div class="input-group">
        <div style="position: relative;">
            <input type="password" id="regPass" placeholder="Crea una Contraseña">
            <span onclick="togglePassword('regPass', this)">🙈</span>
        </div>
    </div>

    <button class="btn" onclick="guardarRegistro()">REGISTRARME</button>
    <div id="regMsg" class="msg"></div>
    <div class="close" onclick="hidePanels()">CANCELAR</div>
</div>

<!-- ADMIN -->
<div class="panel" id="adminPanel">
    <h2>ADMIN CONTROL</h2>
    <p id="currentUserDisplay">Ninguno</p>
    <button class="btn" onclick="borrarTodo()">BORRAR MEMORIA</button>
    <div class="close" onclick="hidePanels()">CERRAR</div>
</div>

<!-- RECUPERAR -->
<div class="panel" id="recoverPanel">
    <h2>RECUPERAR CONTRASEÑA</h2>

    <input type="text" id="recoverUser" placeholder="Usuario">
    <input type="password" id="newPass" placeholder="Nueva contraseña">

    <button class="btn" onclick="recuperarPass()">CAMBIAR</button>
    <div id="recoverMsg"></div>

    <div class="close" onclick="hidePanels()">VOLVER</div>
</div>

<script src="script.js"></script>
</body>
</html>
